# ============================================
# PRODUCTION PROFILE - SubTracker Backend
# ============================================
# Activated via: SPRING_PROFILES_ACTIVE=prod
# All values come from environment variables (Render dashboard)
# ============================================

# ============================================
# SERVER
# ============================================
server.port=${PORT:8080}

# ============================================
# POSTGRESQL (Neon - SSL Required)
# ============================================
# DB_URL must be: jdbc:postgresql://<host>:5432/<db>?sslmode=require
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari pool - optimized for Neon free tier
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.keepalive-time=60000

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# PERFORMANCE - Free Tier Optimization
# ============================================
spring.main.lazy-initialization=true

# ============================================
# JWT
# ============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# EMAIL (Resend HTTP API)
# SMTP is blocked on Render free tier (ports 25/465/587)
# Using Resend.com HTTP API instead (HTTPS port 443)
# Get your API key at: https://resend.com/api-keys
# ============================================
resend.api.key=${RESEND_API_KEY}

# Email sender details
# Use onboarding@resend.dev for testing (no domain verification needed)
# For production, verify your domain at resend.com and use your own
app.email.from=${MAIL_FROM:onboarding@resend.dev}
app.email.from-name=${MAIL_FROM_NAME:SubTracker}

# ============================================
# CORS - Production Frontend Only
# ============================================
cors.allowed.origins=${CORS_ORIGINS}

# ============================================
# FRONTEND URL FOR REDIRECTS
# ============================================
app.frontend.url=${FRONTEND_URL}

# ============================================
# SCRAPER
# ============================================
scraper.usd.to.inr=${USD_TO_INR_RATE:83.0}
scraper.connection.timeout=${SCRAPER_TIMEOUT:15000}
scraper.retry.max-attempts=${SCRAPER_RETRY_MAX:3}
scraper.retry.delay-ms=${SCRAPER_RETRY_DELAY:2000}
scraper.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

# ============================================
# SCHEDULING
# ============================================
spring.task.scheduling.pool.size=2
app.scheduling.timezone=${SCHEDULER_TIMEZONE:Asia/Kolkata}

# ============================================
# ACTUATOR / HEALTH
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ============================================
# LOGGING - Production
# ============================================
logging.level.root=WARN
logging.level.com.subscriptiontracker=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
